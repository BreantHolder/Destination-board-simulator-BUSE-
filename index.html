<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Destination board simulator</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        body { background-color: #0d0d0c; color: #e0e0e0; font-family: 'Segoe UI', system-ui, sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; padding: 20px; }
        .sign-casing { background-color: #08080a; border: 6px solid #1c1c1f; border-radius: 4px; padding: 10px; margin-bottom: 30px; box-shadow: 0 20px 40px rgba(0,0,0,0.7); }
        .led-matrix { display: grid; grid-template-rows: repeat(19, 6px); grid-template-columns: repeat(160, 6px); gap: 2px; background-color: #000000; padding: 2px; }
        .led { width: 6px; height: 6px; background-color: #141416; border-radius: 50%; }
        .controls-container { background-color: #161618; border-radius: 8px; padding: 25px; display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 25px; max-width: 950px; width: 100%; box-shadow: 0 10px 25px rgba(0,0,0,0.4); border: 1px solid #232325; }
        .control-panel { display: flex; flex-direction: column; gap: 14px; }
        label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.75px; color: #a1a1a5; display: block; margin-bottom: 4px; }
        .checkbox-group { display: flex; gap: 15px; margin-top: 2px; }
        .checkbox-group label { display: flex; align-items: center; gap: 6px; text-transform: none; color: #e0e0e0; font-size: 13px; cursor: pointer; }
        input[type="text"], input[type="range"], input[type="file"], select { width: 100%; background-color: #242426; border: 1px solid #323236; color: #fff; padding: 10px; border-radius: 6px; box-sizing: border-box; font-size: 14px; }
        .color-picker-wrapper { display: flex; align-items: center; gap: 10px; background-color: #242426; padding: 8px 12px; border-radius: 6px; border: 1px solid #323236; }
        .btn-danger { background-color: #3a1e1e; border: 1px solid #5c2626; color: #ff8585; padding: 8px 12px; border-radius: 6px; cursor: pointer; font-size: 11px; text-transform: uppercase; font-weight: 600; text-align: center; }
        .section-title { font-size: 12px; font-weight: 700; color: #ffffff; border-bottom: 1px solid #2d2d30; padding-bottom: 6px; margin-bottom: 4px; }
    </style>
</head>
<body>

    <div class="sign-casing" id="captureArea">
        <div class="led-matrix" id="matrix"></div>
    </div>

    <div class="controls-container">
        <div class="control-panel">
            <div class="section-title">Matrix Text Inputs</div>
            <div>
                <label for="lineInput">Line Number (Letters/Nums)</label>
                <input type="text" id="lineInput" value="">
                <div class="checkbox-group">
                    <label><input type="checkbox" id="lineBold" checked> Bold</label>
                    <label><input type="checkbox" id="lineItalic"> Italic</label>
                    <label><input type="checkbox" id="lineInvert"> Invert Line</label>
                </div>
            </div>
            <div>
               <label>Via Option</label>

<div class="checkbox-group">
    <label>
        <input type="checkbox" id="enableVia">
        Enable Via
    </label>
</div>

<div id="viaControls" style="display:none;">

<label for="viaInput">Via Text</label>
<input type="text" id="viaInput" value="">

<div class="checkbox-group">
    <label><input type="checkbox" id="viaInvert"> Invert Via</label>
</div>

<label style="margin-top:10px">Via Scale</label>
<input type="range" id="viaScale" min="0.5" max="2" step="0.1" value="0.8">

<label style="margin-top:10px">Via Position (X)</label>
<input type="range" id="viaScrollX" min="-160" max="160" value="38">

</div>

<hr style="border:1px solid #333; margin:12px 0;">

<label for="destInput">Destination Text</label>
<input type="text" id="destInput" value="">

<div class="checkbox-group">
    <label><input type="checkbox" id="destBold"> Bold</label>
    <label><input type="checkbox" id="destItalic"> Italic</label>
</div>

<label style="margin-top:10px">Destination Scale</label>
<input type="range" id="destFontScale" min="0.1" max="2" step="0.1" value="1">

<label style="margin-top:10px">Destination Position (X)</label>
<input type="range" id="destScrollX" min="-160" max="160" value="38">
            </div>
            <button id="screenshotBtn" class="btn-danger" style="background-color: #265c3e; border: 1px solid #2e734c; color: #85ffb5; margin-top: 10px;">Export Sign Screenshot</button>
        </div>

        <div class="control-panel">
            <div class="section-title">Hardware Photo Digitizer</div>
            <div>
               <label for="imageLoader">Upload Photo / Graphic Asset</label>
<input type="file" id="imageLoader" accept="image/*">

<div class="checkbox-group">
    <label>
        <input type="checkbox" id="keepImageColors">
        Keep Image Colors
    </label>
</div>
            </div>
            <div>
                <label>Graphic Scale (Width)</label>
                <input type="range" id="imgScale" min="8" max="100" value="24">
            </div>
            <div>
                <label>Graphic Horizontal Position (X)</label>
                <input type="range" id="imgX" min="35" max="150" value="130">
            </div>
            <div>
                <label>Graphic Vertical Position (Y)</label>
                <input type="range" id="imgY" min="-10" max="15" value="3">
            </div>
            <button class="btn-danger" id="clearImage" style="display: none;">Remove Uploaded Graphic</button>
        </div>

        <div class="control-panel">
            <div class="section-title">Diode Hardware Profile</div>
            <div class="color-picker-wrapper">
                <input type="color" id="colorActive" value="#ff9900">
                <span>Active Diode Color</span>
            </div>
            <div class="color-picker-wrapper">
                <input type="color" id="colorDormant" value="#000000">
                <span>Dormant Panel Color</span>
            </div>
            <label style="margin-top:10px">Text Vertical Shift</label>
            <input type="range" id="textYOffset" min="-6" max="6" value="0">
        </div>
    </div>

                matrixContainer.appendChild(led);
                gridElements[r][c] = led;
            }
        }

        document.getElementById('screenshotBtn').addEventListener('click', function() {
            html2canvas(document.getElementById('captureArea'), { backgroundColor: "#08080a", scale: 2 }).then(canvas => {
                const link = document.createElement('a');
                link.download = 'destination_board.png';
                link.href = canvas.toDataURL('image/png');
                link.click();
            });
        });

        
function fillRect(buffer, x, y, w, h, value){

    for(let yy=y; yy<y+h; yy++){

        if(yy<0 || yy>=ROWS) continue;

        for(let xx=x; xx<x+w; xx++){

            if(xx<0 || xx>=COLS) continue;

            buffer[yy][xx]=value;

        }

    }

}
        function drawGlyphToBuffer(buffer, glyph, startX, startY, isBold, isItalic, scale, isInverted) {
            const glyphRows = glyph.length;
            const glyphCols = glyph[0].length;
            const activeVal = isInverted ? 0 : 1;
            for (let row = 0; row < glyphRows; row++) {
                for (let col = 0; col < glyphCols; col++) {
                    if (glyph[row][col] === '#') {
                        const drawSize = Math.max(1, Math.round(scale));
                        for (let sr = 0; sr < drawSize; sr++) {
                            for (let sc = 0; sc < drawSize; sc++) {
                                const outY = startY + Math.round(row * scale) + sr;
                                const outX = startX + Math.round(col * scale) + sc + (isItalic ? Math.floor((glyphRows - row) * 0.2) : 0);
                                if (outY >= 0 && outY < ROWS && outX >= 0 && outX < COLS) {
                                    buffer[outY][outX] = activeVal;
                                    if (isBold && (outX + 1) < COLS) buffer[outY][outX + 1] = activeVal;
                                }
                            }
                        }
                    }
                }
            }
        }

        function drawStringToBuffer(buffer, text, font, startX, startY, isBold, isItalic, scale, isInverted) {
            let currentX = startX;
            for (let i = 0; i < text.length; i++) {
                const char = text[i];
                const glyph = font[char] || font[' '];
                if (!glyph) continue;
                drawGlyphToBuffer(buffer, glyph, currentX, startY, isBold, isItalic, scale, isInverted);
                currentX += Math.round(glyph[0].length * scale) + 1;
            }
        }

        function drawImageToBuffer(buffer, isInverted) {
            if (!uploadedImage) return;
            const targetW = parseInt(document.getElementById('imgScale').value);
            const aspect = uploadedImage.height / uploadedImage.width;
            const targetH = Math.max(1, Math.round(targetW * aspect));
            const imgX = parseInt(document.getElementById('imgX').value);
            const imgY = parseInt(document.getElementById('imgY').value);
            const canvas = document.getElementById('hiddenCanvas');
            const ctx = canvas.getContext('2d');
            canvas.width = targetW; canvas.height = targetH;
            ctx.clearRect(0, 0, targetW, targetH);
            ctx.drawImage(uploadedImage, 0, 0, targetW, targetH);
            const imgData = ctx.getImageData(0, 0, targetW, targetH).data;

            const activeVal = isInverted ? 0 : 1;
            for (let y = 0; y < targetH; y++) {
                for (let x = 0; x < targetW; x++) {
                    const idx = (y * targetW + x) * 4;
                    const r = imgData[idx], g = imgData[idx+1], b = imgData[idx+2], a = imgData[idx+3];
                    let isDark = (r + g + b) < 450; 
                    if ((removeBackground ? (isDark && a > 128) : (a > 128))) {
                        const outY = imgY + y;
                        const outX = imgX + x;
                        if (outY >= 0 && outY < ROWS && outX >= 0 && outX < COLS) {

    buffer[outY][outX] = activeVal;

    if(document.getElementById("keepImageColors").checked){

        if(!imageColorBuffer)
            imageColorBuffer = Array.from(
                {length: ROWS},
                ()=>Array(COLS).fill(null)
            );

        imageColorBuffer[outY][outX] =
            `rgb(${r},${g},${b})`;
    }
}
                    }
                }
            }
        }

        function refreshMatrix() {
           const lineInvert =
document.getElementById("lineInvert").checked;

const viaInvert =
document.getElementById("viaInvert").checked;
            const cActive = document.getElementById('colorActive').value;
            const cDormant = document.getElementById('colorDormant').value;
            const lineText = document.getElementById('lineInput').value;
const useVia = document.getElementById("enableVia").checked;
const viaText = useVia ? document.getElementById("viaInput").value : "";

const viaScale =
parseFloat(document.getElementById("viaScale").value);

const viaScrollX =
parseInt(document.getElementById("viaScrollX").value);
            const destText = document.getElementById('destInput').value;
            const destScale = parseFloat(document.getElementById('destFontScale').value);
            const scrollX = parseInt(document.getElementById('destScrollX').value);
            
            const bitBuffer =
Array.from(
    { length: ROWS },
    () => Array(COLS).fill(0)
)
imageColorBuffer = Array.from(
    {length: ROWS},
    ()=>Array(COLS).fill(null)
);
// Inverted line box

if(lineInvert){

    fillRect(
        bitBuffer,
        0,
        0,
        30,
        ROWS,
        1
    );

}

// Inverted VIA strip

if(viaInvert){

    fillRect(
        bitBuffer,
        30,
        0,
        130,
        8,
        1
    );

}
            
      drawStringToBuffer(
    bitBuffer,
    lineText,
    FONT_SMALL,
    2,
    4,
    document.getElementById("lineBold").checked,
    document.getElementById("lineItalic").checked,
    1.75,
    lineInvert
);

if(useVia){

drawStringToBuffer(
    bitBuffer,
    viaText,
    FONT_SMALL,
    viaScrollX,
    1,
    false,
    false,
    viaScale,
    viaInvert
);

}

drawStringToBuffer(
    bitBuffer,
    destText,
    FONT_SMALL,
    scrollX,
    useVia ? 10 : 5,
    document.getElementById("destBold").checked,
    document.getElementById("destItalic").checked,
    destScale,
    false
);

drawImageToBuffer(
    bitBuffer,
    false
);

            for (let r = 0; r < ROWS; r++) {
                for (let c = 0; c < COLS; c++) {
                    if(imageColorBuffer[r][c] && document.getElementById("keepImageColors").checked){

    gridElements[r][c].style.backgroundColor =
        imageColorBuffer[r][c];

}
else{

    gridElements[r][c].style.backgroundColor =
        (bitBuffer[r][c] === 1) ? cActive : cDormant;

}
                }
            }
        }

        document.getElementById('imageLoader').addEventListener('change', function(e) {
            const reader = new FileReader();
            reader.onload = function(event) {
                uploadedImage = new Image();
                uploadedImage.onload = function() {
                    removeBackground = confirm("Do you want to remove the background?");
                    document.getElementById('clearImage').style.display = 'block';
                    refreshMatrix();
                };
                uploadedImage.src = event.target.result;
            };
            if(e.target.files[0]) reader.readAsDataURL(e.target.files[0]);
        });

        document.getElementById('clearImage').addEventListener('click', function() {
            uploadedImage = null;
            document.getElementById('imageLoader').value = '';
            this.style.display = 'none';
            refreshMatrix();
        });
const enableVia = document.getElementById("enableVia");
const viaControls = document.getElementById("viaControls");

enableVia.addEventListener("change", function(){

    if(this.checked){
        viaControls.style.display = "block";
    }
    else{
        viaControls.style.display = "none";
    }

    refreshMatrix();
});
        document.querySelectorAll('input').forEach(el => el.addEventListener('input', refreshMatrix));
        refreshMatrix();
    </script>
